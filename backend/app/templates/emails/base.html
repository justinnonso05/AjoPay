<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{% block title %}{% endtitle %}</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f7faf8;
            margin: 0;
            padding: 0;
            color: #1a1a2e;
        }
        .container {
            max-width: 500px;
            margin: 40px auto;
            background-color: #ffffff;
            padding: 32px;
        }
        .header {
            text-align: center;
            margin-bottom: 32px;
        }
        .header h1 {
            color: #2F855A; /* minimal light green */
            margin: 0;
            font-size: 24px;
            font-weight: 600;
        }
        .content {
            font-size: 15px;
            line-height: 1.6;
        }
        .content p {
            margin: 16px 0;
        }
        .footer {
            margin-top: 48px;
            text-align: center;
            font-size: 12px;
            color: #888888;
        }
        .btn {
            display: inline-block;
            background-color: #2F855A;
            color: #ffffff;
            padding: 12px 24px;
            text-decoration: none;
            font-weight: 500;
            margin: 16px 0;
            text-align: center;
        }
        .highlight-box {
            background-color: #f0fdf4;
            padding: 24px;
            text-align: center;
            margin: 24px 0;
        }
        .highlight-text {
            font-size: 28px;
            font-weight: bold;
            color: #2F855A;
            letter-spacing: 2px;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>AjoPay</h1>
        </div>
        
        <div class="content">
            {% block content %}{% endblock %}
        </div>
        
        <div class="footer">
            <p>AjoPay — Rotating savings, reimagined.</p>
        </div>
    </div>
</body>
</html>
